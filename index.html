    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Mobile Container (Same as Screenshot Layout) */
        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #0f1015 0%, #07080a 100%);
            border: 2px solid #332917;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Top Tag */
        .top-tag {
            display: inline-block;
            border: 1px solid #bf913b;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 700;
            color: #f3af3d;
            letter-spacing: 1px;
            margin-bottom: 30px;
            background: rgba(191, 145, 59, 0.05);
        }

        /* Profile Image Section with Glow */
        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px auto;
        }

        .avatar-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(243,175,61,0.4) 0%, rgba(0,0,0,0) 70%);
            transform: scale(1.2);
            z-index: 1;
        }

        .avatar-img {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #f3af3d;
            object-fit: cover;
            z-index: 2;
        }

        /* Typography */
        .main-title {
            font-size: 32px;
            font-weight: 800;
            color: #f3af3d;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .sub-title {
            font-size: 16px;
            color: #a0a5b5;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Stats Grid (3 Columns) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            background-color: #161a24;
            border-radius: 12px;
            padding: 15px 5px;
            border: 1px solid #222836;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: #f3af3d;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #7e8494;
            font-weight: 500;
        }

        /* Features List */
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .feature-item {
            background-color: #141720;
            border: 1px solid #1e2230;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
            text-align: left;
        }

        .feature-icon {
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
        }

        /* CTA Button */
        .cta-btn {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #00b4fc 0%, #0076ff 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            padding: 18px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0px 4px 15px rgba(0, 118, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cta-btn:active {
            transform: scale(0.98);
            box-shadow: 0px 2px 8px rgba(0, 118, 255, 0.4);
        }
